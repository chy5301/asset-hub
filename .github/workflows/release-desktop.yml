name: release-desktop

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write # softprops/action-gh-release 创建 Release 需写权限
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend build

      - name: Install python deps (desktop extra + packaging group)
        run: uv sync --extra desktop --group packaging

      - name: PyInstaller build
        run: uv run --extra desktop --group packaging pyinstaller packaging/asset_hub.spec --noconfirm

      - name: Zip onedir
        run: Compress-Archive -Path dist/asset-hub/* -DestinationPath asset-hub-desktop-${{ github.ref_name }}-win64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-hub-desktop-win64
          path: asset-hub-desktop-${{ github.ref_name }}-win64.zip

      # 仅 tag push 触发：创建/更新对应版本的 GitHub Release 并挂上 zip。
      # workflow_dispatch（从分支跑）无 tag → 跳过，只产 artifact 供烟测。
      # 自动生成的 release notes 是基线，作者可事后改成「发版升级指南」风格。
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: asset-hub-desktop-${{ github.ref_name }}-win64.zip
          generate_release_notes: true
