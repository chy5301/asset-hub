name: 功能请求
description: 提议新功能或改进现有功能
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 涉及的模块
      description: 选择此功能涉及的模块
      options:
        - "area: cli"
        - "area: api"
        - "area: frontend"
        - "area: serve"
        - "area: db-migration"
        - "area: storage"
        - 跨模块 / 不确定
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 功能概述
      description: 简要描述你希望添加或改进的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述你遇到的问题或需求背景;请说明这是面向人类用户、AI Agent,还是两者
    validations:
      required: true

  - type: textarea
    id: expected-usage
    attributes:
      label: 期望的使用方式
      placeholder: |
        CLI 例:
          asset-hub asset xxx --foo bar

        或描述 Web GUI 上的交互流程
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他做法,以及为什么不选(可选)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 相关 issue/PR、设计文档(`docs/superpowers/specs/`)链接等(可选)
    validations:
      required: false
